name: CI

on:
  push:
  pull_request:

jobs:
  fast-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10"]
    env:
      MPLBACKEND: Agg
      SIM_AUTOMATION: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
      - name: Import smoke test
        run: python -c "import run_simulation; import sim; print('import_ok')"
      - name: Run fast unit tests
        run: |
          pytest -q \
            sim/tests/test_profiles.py \
            sim/tests/test_scenario_yaml_config.py \
            sim/tests/test_plugin_validation.py
  full-tests:
    runs-on: ubuntu-latest
    needs: fast-tests
    env:
      MPLBACKEND: Agg
      SIM_AUTOMATION: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
      - name: Run full test suite
        run: pytest -q
      - name: Run automation smoke simulation
        run: python run_simulation.py --config configs/automation_smoke.yaml
