scenario_name: "validation_orbit_high_fidelity_mc"

metadata:
  owner: "validation"
  notes: "High-fidelity no-control Monte Carlo benchmark for orbit/environment stack stability."

rocket:
  enabled: false
  role: "rocket"

chaser:
  enabled: true
  role: "chaser"
  specs:
    preset_satellite: "BASIC_SATELLITE"
    dry_mass_kg: 170.0
    fuel_mass_kg: 50.0
    thruster: "BASIC_CHEMICAL_Z_BOTTOM"
    attitude_system: "BASIC_REACTION_WHEELS_3AXIS"
  initial_state:
    relative_to_target_ric:
      frame: "curv"
      state: [0.0, -5.0, 0.0, 0.0, 0.0, 0.0]
    attitude_quat_bn: [1.0, 0.0, 0.0, 0.0]
    angular_rate_body_rad_s: [0.10, -0.08, 0.06]
  orbit_control:
    kind: "python"
    module: "sim.control.orbit.zero_controller"
    class_name: "ZeroController"
    params: {}
  attitude_control:
    kind: "python"
    module: "sim.control.attitude.zero_torque"
    class_name: "ZeroTorqueController"
    params: {}
  mission_objectives: []
  knowledge:
    refresh_rate_s: 1.0
    targets: ["target"]
    conditions:
      require_line_of_sight: true
      max_range_km: 10000.0
    sensor_error:
      pos_sigma_km: [0.005, 0.005, 0.005]
      vel_sigma_km_s: [0.00005, 0.00005, 0.00005]
    estimation:
      type: "ekf"

target:
  enabled: true
  role: "target"
  specs:
    preset_satellite: "BASIC_SATELLITE"
    dry_mass_kg: 360.0
    fuel_mass_kg: 40.0
    attitude_system: "BASIC_REACTION_WHEELS_3AXIS"
  initial_state:
    coes:
      a_km: 7000.0
      ecc: 0.0
      inc_deg: 45.0
      raan_deg: 0.0
      argp_deg: 0.0
      true_anomaly_deg: 0.0
    attitude_quat_bn: [1.0, 0.0, 0.0, 0.0]
    angular_rate_body_rad_s: [0.0, 0.0, 0.0]
  orbit_control:
    kind: "python"
    module: "sim.control.orbit.zero_controller"
    class_name: "ZeroController"
    params: {}
  attitude_control:
    kind: "python"
    module: "sim.control.attitude.zero_torque"
    class_name: "ZeroTorqueController"
    params: {}
  mission_objectives: []
  knowledge:
    refresh_rate_s: 5.0
    targets: ["chaser"]
    conditions:
      require_line_of_sight: true
      max_range_km: 50000.0
    sensor_error:
      pos_sigma_km: [0.02, 0.02, 0.02]
      vel_sigma_km_s: [0.0002, 0.0002, 0.0002]
    estimation:
      type: "ekf"

simulator:
  scenario_type: "auto"
  duration_s: 1800.0
  dt_s: 2.0
  initial_jd_utc: 2460400.5
  dynamics:
    orbit:
      orbit_substep_s: 1.0
      model: "two_body"
      j2: true
      j3: true
      j4: true
      drag: true
      srp: true
      third_body_sun: true
      third_body_moon: true
      spherical_harmonics:
        enabled: false
        degree: 8
        order: 8
    attitude:
      enabled: true
      attitude_substep_s: 0.05
      disturbance_torques:
        gravity_gradient: false
        magnetic: false
        drag: false
        srp: false
    rocket:
      enabled: false
  environment:
    ephemeris_mode: "analytic_enhanced"
    atmosphere_model: "ussa1976"
    atmosphere_env:
      f107: 150.0
      f107a: 150.0
      ap: 15.0
  plugin_validation:
    strict: true
  termination:
    earth_impact_enabled: true
    earth_radius_km: 6378.137

outputs:
  output_dir: "outputs/validation_orbit_high_fidelity_mc"
  mode: "save"
  stats:
    enabled: true
    print_summary: false
    save_json: false
    save_csv: false
    save_full_log: false
  plots:
    enabled: false
    figure_ids: []
  animations:
    enabled: false
    types: []
  monte_carlo:
    save_iteration_summaries: false
    save_aggregate_summary: true
    save_histograms: false
    display_histograms: false
    save_ops_dashboard: false
    display_ops_dashboard: false
    save_raw_runs: false
    baseline_summary_json: ""
    success_termination_reasons: ["rocket_orbit_insertion"]
    catastrophic_failure_reasons: ["terminated_early:earth_impact"]
    require_rocket_insertion: false
    gates:
      min_closest_approach_km: 0.20
      max_duration_s: 2000.0
      max_total_dv_m_s: 1.0
      max_guardrail_events: 20

monte_carlo:
  enabled: true
  iterations: 4
  base_seed: 3300
  parallel_enabled: false
  parallel_workers: 1
  variations:
    - parameter_path: "chaser.initial_state.relative_to_target_ric.state[1]"
      mode: "normal"
      mean: -5.0
      std: 1.0
    - parameter_path: "chaser.initial_state.relative_to_target_ric.state[0]"
      mode: "normal"
      mean: 0.0
      std: 0.3
    - parameter_path: "simulator.environment.atmosphere_env.ap"
      mode: "choice"
      options: [5.0, 15.0, 30.0]
