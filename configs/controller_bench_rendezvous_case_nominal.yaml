scenario_name: controller_bench_rendezvous_nominal
rocket:
  enabled: false
chaser:
  enabled: true
  specs:
    preset_satellite: BASIC_SATELLITE
    dry_mass_kg: 180.0
    fuel_mass_kg: 20.0
    thruster: BASIC_CHEMICAL_Z_BOTTOM
    attitude_system: BASIC_REACTION_WHEELS_3AXIS
  initial_state:
    relative_to_target_ric:
      frame: curv
      state: [0.0, -3.0, 0.0, 0.0, 0.0, 0.0]
target:
  enabled: true
  specs:
    preset_satellite: BASIC_SATELLITE
    dry_mass_kg: 360.0
    fuel_mass_kg: 0.0
  initial_state:
    coes:
      a_km: 7000.0
      ecc: 0.0
      inc_deg: 45.0
      raan_deg: 0.0
      argp_deg: 0.0
      true_anomaly_deg: 0.0
  orbit_control:
    module: sim.control.orbit.zero_controller
    class_name: ZeroController
    params: {}
simulator:
  duration_s: 30.0
  dt_s: 1.0
  termination:
    earth_impact_enabled: false
  dynamics:
    attitude:
      enabled: false
outputs:
  output_dir: outputs/controller_bench_rendezvous_nominal
  mode: save
  stats:
    print_summary: false
    save_json: false
    save_full_log: false
  plots:
    enabled: false
    figure_ids: []
  animations:
    enabled: false
    types: []
monte_carlo:
  enabled: false
