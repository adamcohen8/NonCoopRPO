chaser:
  enabled: false
target:
  enabled: true
  specs:
    mass_kg: 120.0
    mass_properties:
      inertia_kg_m2:
        - [12.0, 0.0, 0.0]
        - [0.0, 10.0, 0.0]
        - [0.0, 0.0, 8.0]
  initial_state:
    position_eci_km: [7000.0, 0.0, 0.0]
